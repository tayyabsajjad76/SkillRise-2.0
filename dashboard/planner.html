<!-- PLANNER -->
<div class="section-page" id="page-planner">
  <div class="sec-label">Daily &amp; Weekly Planner</div>
  <div class="sec-title">Today's Learning Plan</div>
  <div class="sec-desc" id="plannerDesc">AI-generated tasks based on your profile.</div>

  <div style="margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <button id="generatePlannerBtn" onclick="generateDailyPlan()"
      style="background:#1a56ff;color:#fff;border:none;padding:10px 22px;border-radius:50px;cursor:pointer;font-size:0.88rem;font-weight:600;">
      🤖 Generate Today's Plan
    </button>
    <span id="plannerStatus" style="color:#8892b0;font-size:0.82rem;"></span>
  </div>

  <div class="row2">
    <div class="full-card">
      <div class="card-title-row"><h3>📅 Today's Tasks</h3><span class="badge badge-orange" id="taskBadge">0 / 0 Done</span></div>
      <div id="taskList">
        <div style="color:#8892b0;font-size:0.9rem;padding:20px 0;">⏳ Click "Generate Today's Plan" to get AI tasks...</div>
      </div>
    </div>
    <div class="col-flex">
      <div class="full-card">
        <div class="card-title-row"><h3>📆 This Week</h3></div>
        <div id="weeklyPlan">
          <div style="color:#8892b0;font-size:0.85rem;padding:10px 0;">Weekly plan will appear after generating.</div>
        </div>
      </div>
      <div class="full-card planner-tip">
        <div class="card-title-row"><h3>AI Tip 🤖</h3></div>
        <p id="aiTipText">Your personalized tip will appear after generating your plan.</p>
      </div>
    </div>
  </div>
</div>
