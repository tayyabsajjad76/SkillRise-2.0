<!-- RESOURCES -->
<div class="section-page" id="page-resources">
  <div class="sec-label">Resource Assistant</div>
  <div class="sec-title">Curated Learning Materials</div>
  <div class="sec-desc" id="resourceDesc">AI-picked resources based on your learning field.</div>

  <div style="margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <button id="generateResourcesBtn" onclick="generateResources()"
      style="background:#1a56ff;color:#fff;border:none;padding:10px 22px;border-radius:50px;cursor:pointer;font-size:0.88rem;font-weight:600;">
      🤖 Generate Resources
    </button>
    <span id="resourceStatus" style="color:#8892b0;font-size:0.82rem;"></span>
  </div>

  <div class="row2">
    <div class="full-card">
      <div class="card-title-row"><h3>🎥 Video Tutorials</h3></div>
      <div id="videoList">
        <div style="color:#8892b0;font-size:0.9rem;padding:20px 0;">⏳ Click "Generate Resources" to load...</div>
      </div>
    </div>
    <div class="full-card">
      <div class="card-title-row"><h3>📄 Docs &amp; Articles</h3></div>
      <div id="docsList">
        <div style="color:#8892b0;font-size:0.9rem;padding:20px 0;">⏳ Loading...</div>
      </div>
    </div>
  </div>
</div>
