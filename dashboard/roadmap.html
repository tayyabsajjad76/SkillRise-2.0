<div class="section-page" id="page-roadmap">
  <div class="sec-label">Learning Path</div>
  <div class="sec-title">Your Personalized Roadmap</div>
  <div class="sec-desc" id="roadmapDesc">Loading your personalized roadmap...</div>

  <div style="margin-bottom:20px;margin-top:16px;">
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
      <input id="roadmapField" type="text" placeholder="e.g. Data Science, Mobile Dev, Cybersecurity..." 
        style="flex:1;min-width:200px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:50px;padding:10px 20px;color:#f0f4ff;font-size:0.9rem;outline:none;" />
      <button id="generateRoadmapBtn" onclick="generateRoadmap()" 
        style="background:#1a56ff;color:#fff;border:none;padding:12px 24px;border-radius:50px;cursor:pointer;font-size:0.9rem;font-weight:600;white-space:nowrap;">
        🤖 Generate AI Roadmap
      </button>
    </div>
    <div id="aiRoadmapOutput" style="display:none;margin-top:16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;font-size:0.85rem;line-height:1.8;white-space:pre-wrap;color:#f0f4ff;"></div>
  </div>

  <div class="row2">
    <div class="full-card">
      <div class="card-title-row"><h3>Milestones</h3><span class="badge badge-blue" id="milestoneBadge">Loading...</span></div>
      <div class="roadmap-steps" id="roadmapSteps"></div>
    </div>
    <div class="col-flex-18">
      <div class="full-card">
        <div class="card-title-row"><h3>Overall Progress</h3></div>
        <div class="prog-wrap"><div class="prog-row"><span>Roadmap</span><span>68%</span></div><div class="prog-track"><div class="prog-fill prog-fill--primary" data-w="68"></div></div></div>
        <div class="prog-wrap"><div class="prog-row"><span>Quizzes Passed</span><span>78%</span></div><div class="prog-track"><div class="prog-fill prog-fill--accent" data-w="78"></div></div></div>
        <div class="prog-wrap"><div class="prog-row"><span>Projects Done</span><span>12/15</span></div><div class="prog-track"><div class="prog-fill prog-fill--warn" data-w="80"></div></div></div>
        <div class="prog-wrap"><div class="prog-row"><span>Interview Ready</span><span>87%</span></div><div class="prog-track"><div class="prog-fill prog-fill--purple" data-w="87"></div></div></div>
      </div>
      <div class="full-card">
        <div class="card-title-row"><h3>Skill Badges</h3></div>
        <div class="skill-badges" id="roadmapSkillBadges">
          <span class="badge badge-orange">⏳ Generating badges...</span>
        </div>
      </div>
    </div>
  </div>
</div>
