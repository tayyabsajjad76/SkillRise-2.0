<!-- COURSES -->
<div class="section-page" id="page-courses">
  <div class="sec-label">Smart Course Suggestions</div>
  <div class="sec-title">AI-Recommended Next Courses</div>
  <div class="sec-desc" id="coursesDesc">Based on your skill gaps and career goal, AI suggests these courses.</div>

  <div style="margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <button id="generateCoursesBtn" onclick="generateCourses()"
      style="background:#1a56ff;color:#fff;border:none;padding:10px 22px;border-radius:50px;cursor:pointer;font-size:0.88rem;font-weight:600;">
      🤖 Refresh Suggestions
    </button>
    <span id="coursesStatus" style="color:#8892b0;font-size:0.82rem;"></span>
  </div>

  <div class="cards-grid" id="courseCardsGrid">
    <div style="color:#8892b0;font-size:0.9rem;padding:20px 0;">⏳ Generating course suggestions...</div>
  </div>

  <div class="full-card" style="margin-top:20px;">
    <div class="card-title-row"><h3>All Courses Progress</h3><span class="badge badge-green" id="coursesDoneCount">0 Done</span></div>
    <div class="courses-all-grid" id="coursesProgressGrid">
      <div style="color:#8892b0;font-size:0.85rem;">No courses started yet.</div>
    </div>
  </div>
</div>
