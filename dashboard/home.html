<!-- HOME -->
<div class="section-page active" id="page-home">
  <div class="home-hero">
    <div class="home-hero-glow"></div>
    <h2>Welcome back, <span id="heroUserName">there</span>! 👋</h2>
    <p id="heroSubtext">Loading your learning summary...</p>
    <div class="home-hero-btns">
      <button class="btn btn-accent" onclick="goto('planner')"><i class="fa-solid fa-calendar-check"></i>Today's Tasks</button>
      <button class="btn btn-outline" onclick="goto('interview')"><i class="fa-solid fa-microphone"></i>Mock Interview</button>
    </div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="s-lbl">Readiness Score</div><div class="s-val s-val--accent" id="homeReadiness">—</div><div class="s-sub" id="homeReadinessSub">Calculating...</div></div>
    <div class="stat-card"><div class="s-lbl">Day Streak</div><div class="s-val s-val--warn" id="homeStreak">—</div><div class="s-sub">Keep it up!</div></div>
    <div class="stat-card"><div class="s-lbl">Quiz Average</div><div class="s-val s-val--blue" id="homeQuizAvg">—</div><div class="s-sub" id="homeQuizSub">No quizzes yet</div></div>
    <div class="stat-card"><div class="s-lbl">Projects Done</div><div class="s-val s-val--purple" id="homeProjectsDone">0</div><div class="s-sub" id="homeProjectSub">Start your first project</div></div>
  </div>
  <div class="cards-grid">
    <div class="card" onclick="goto('roadmap')"><div class="card-icon">🗺️</div><h4>Learning Roadmap</h4><p id="homeRoadmapText">Loading...</p><div class="prog-wrap"><div class="prog-track"><div class="prog-fill prog-fill--primary" id="homeRoadmapBar" style="width:0%"></div></div></div></div>
    <div class="card" onclick="goto('quiz')"><div class="card-icon">📝</div><h4>Weekly Quiz</h4><p id="homeQuizText">Loading...</p><div><span class="badge badge-orange" id="homeQuizBadge">Take a quiz</span></div></div>
    <div class="card" onclick="goto('projects')"><div class="card-icon">🔨</div><h4>Active Project</h4><p id="homeProjectText">Loading...</p><div class="prog-wrap"><div class="prog-track"><div class="prog-fill prog-fill--warn" id="homeProjectBar" style="width:0%"></div></div></div></div>
  </div>
</div>
