<!-- GAMIFICATION -->
<div class="section-page" id="page-gamification">
  <div class="sec-label">Badges &amp; Levels</div>
  <div class="sec-title">Your Achievements</div>
  <div class="sec-desc">Level up, earn badges, and climb the leaderboard. Every milestone is celebrated!</div>
  <div class="row2">
    <div class="full-card">
      <div class="card-title-row"><h3>Level Progress</h3><span class="badge badge-orange" id="levelBadge">Level 1 ⭐</span></div>
      <div class="level-center">
        <div class="level-number" id="levelNumber">⭐ 1</div>
        <div class="level-label" id="levelLabel">Newcomer</div>
        <div class="prog-wrap">
          <div class="prog-row"><span>XP to next level</span><span id="xpLabel">0 / 1,000</span></div>
          <div class="prog-track"><div class="prog-fill prog-fill--warn" id="xpBar" style="width:0%"></div></div>
        </div>
        <div style="margin-top:8px;color:#8892b0;font-size:0.82rem;">Total XP: <span id="totalXpLabel" style="color:#f0a500;font-weight:700;">0</span></div>
      </div>
      <div class="leaderboard">
        <div class="leaderboard-title">LEADERBOARD</div>
        <div class="leaderboard-row--you" id="leaderboardYou"><span>⭐ <strong>You</strong></span><span class="val-warn" id="yourXpLabel">0 XP · #12</span></div>
      </div>
    </div>
    <div class="full-card">
      <div class="card-title-row"><h3>Earned Badges</h3><span class="badge badge-green" id="badgeCount">0 / 6</span></div>
      <div class="badge-grid" id="badgeGrid">
        <!-- rendered by JS -->
      </div>
    </div>
  </div>
</div>
